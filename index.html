<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Merger (PDF + obrazy)</title>
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/downloadjs@1.4.7/download.min.js"></script>
    
    <link rel="stylesheet" href="./style.css?v=4">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="ambient-background">
        <div class="panel p1"></div>
        <div class="panel p2"></div>
        <div class="panel p3"></div>
        <div class="panel p4"></div>
        <div class="panel p5"></div>
        <div class="panel p6"></div>
        <div class="panel p7"></div>
        <div class="panel p8"></div>
        <div class="panel p9"></div>
        <div class="panel p10"></div>
        <div class="panel p11"></div>
        <div class="panel p12"></div>
        <div class="panel p13"></div>
        <div class="panel p14"></div>
        <div class="panel p15"></div>
        <div class="panel p16"></div>
        <div class="panel p17"></div>
        <div class="panel p18"></div>
        <div class="panel p19"></div>
        <div class="panel p20"></div>
    </div>

    <button id="theme-toggle" class="theme-btn" title="Zmień motyw">
        <span id="theme-icon">☀️</span>
    </button>

    <div class="version-badge" aria-hidden="true" title="Wersja: 270426-850" style="position:fixed;right:10px;bottom:8px;z-index:100;color:var(--text-muted);font:500 10px/1 Inter,-apple-system,sans-serif;opacity:.16;pointer-events:none;user-select:none;">ver.270426-904</div>

    <div class="content-wrapper">
        <h1>Łączenie PDF i obrazów</h1>
        <p class="subtitle">by Michał Kuś</p>

        <div class="glass-container main-card">
            <label id="uploadSection" class="upload-section" for="fileInput" tabindex="0" aria-label="Dodaj pliki PDF, JPG lub PNG">
                <div class="icon-box">📄</div>
                <p>Kliknij albo przeciągnij tutaj pliki PDF, JPG lub PNG</p>
                <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,application/pdf,image/jpeg,image/png" multiple>
            </label>

            <div class="controls" id="sortControls" style="display: none;">
                <button class="btn btn-secondary" onclick="sortFiles('upload')">Kolejność przesłania</button>
                <button class="btn btn-secondary" onclick="sortFiles('alpha')">Alfabetycznie (A-Z)</button>
            </div>

            <ul id="file-list"></ul>

            <div class="options-wrapper" id="optionsWrapper" style="display: none;">
                <div class="filename-container">
                    <input type="text" id="fileNameInput" placeholder="Nazwa pliku (opcjonalnie)">
                    <span class="extension-hint">.pdf</span>
                </div>

                <label class="checkbox-container">
                    <input type="checkbox" id="chaptersOpt" checked>
                    <span class="checkmark"></span>
                    <span class="label-text">Dodaj rozdziały z nazw plików</span>
                </label>
            </div>

            <div class="action-buttons">
                <button id="resetBtn" class="btn btn-reset" onclick="resetApp()" style="display: none;">Resetuj</button>
                <button id="mergeBtn" class="btn btn-primary" onclick="mergePDFs()" disabled>Połącz i pobierz PDF</button>
            </div>

            <div id="status"></div>
        </div>
    </div>

    <script src="./script.js?v=4"></script>
</body>
</html>
